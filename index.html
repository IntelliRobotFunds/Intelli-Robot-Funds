<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IntelliRobot Funds - Gestión Dinámica</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #000; color: white; margin: 0; }
    .modal-bg { background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
    .coin-card { background: #121212; border: 1px solid #27272a; transition: transform 0.2s; }
    .coin-card:hover { transform: translateY(-5px); border-color: #10b981; }
  </style>
</head>
<body>

<nav class="bg-black/90 fixed w-full z-50 border-b border-zinc-800 px-6 py-4 flex justify-between items-center">
  <div class="flex items-center gap-3">
    <img src="logo.jpg" alt="Logo" class="w-10 h-10 object-contain">
    <span class="text-2xl font-bold">IntelliRobot Funds</span>
  </div>
  <div id="authButtons" class="hidden flex gap-4">
    <button onclick="showLoginModal()" class="bg-emerald-600 px-6 py-2 rounded-full font-bold">Entrar</button>
  </div>
</nav>

<div id="dashboard" class="hidden max-w-7xl mx-auto px-6 py-24">
  <div class="flex justify-between items-center mb-12 bg-zinc-900/50 p-6 rounded-2xl border border-zinc-800">
    <div>
      <p class="text-zinc-400 text-sm uppercase tracking-widest">Inversor</p>
      <p id="userEmailDisplay" class="text-xl font-bold text-emerald-400"></p>
    </div>
    <button onclick="logout()" class="text-red-500 hover:text-white transition">Cerrar Sesión</button>
  </div>

  <div id="userStats" class="hidden">
    <div class="mb-8 text-center">
        <span class="bg-emerald-500/10 text-emerald-500 px-4 py-1 rounded-full text-xs font-bold border border-emerald-500/20">
            Tasa de Rendimiento Actual: <span id="currentAPYDisplay">0</span>% APY
        </span>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
      <div class="coin-card p-8 rounded-3xl text-center">
        <p class="text-orange-500 font-bold mb-2">BITCOIN</p>
        <div id="capBTC" class="text-4xl font-mono font-bold">0.000000</div>
        <p class="text-[10px] text-zinc-500 mt-4">EST. GANANCIA 24H</p>
        <p id="profitBTC" class="text-emerald-400 font-bold text-xl">+0.000000</p>
      </div>
      <div class="coin-card p-8 rounded-3xl text-center">
        <p class="text-blue-400 font-bold mb-2">ETHEREUM</p>
        <div id="capETH" class="text-4xl font-mono font-bold">0.000000</div>
        <p class="text-[10px] text-zinc-500 mt-4">EST. GANANCIA 24H</p>
        <p id="profitETH" class="text-emerald-400 font-bold text-xl">+0.000000</p>
      </div>
      <div class="coin-card p-8 rounded-3xl text-center">
        <p class="text-emerald-500 font-bold mb-2">USDT</p>
        <div id="capUSDT" class="text-4xl font-mono font-bold">0.00</div>
        <p class="text-[10px] text-zinc-500 mt-4">EST. GANANCIA 24H</p>
        <p id="profitUSDT" class="text-emerald-400 font-bold text-xl">+0.00</p>
      </div>
    </div>
    <div class="flex gap-4">
        <button onclick="startInvestment()" class="flex-1 bg-emerald-600 py-6 rounded-2xl font-bold text-xl">Invertir</button>
        <button onclick="showWithdrawalModal()" class="flex-1 bg-zinc-800 py-6 rounded-2xl font-bold text-xl border border-zinc-700">Retirar</button>
    </div>
  </div>

  <div id="adminPanel" class="hidden space-y-8">
    <div class="bg-zinc-900 p-8 rounded-3xl border border-emerald-500/30">
        <h3 class="text-emerald-400 font-bold mb-4 uppercase text-xs tracking-widest">Configuración de Rendimiento</h3>
        <div class="flex items-center gap-4">
            <div class="flex-1">
                <p class="text-zinc-500 text-xs mb-2">Tasa APY Global (%)</p>
                <input id="apyInput" type="number" step="0.1" class="w-full bg-black border border-zinc-700 p-3 rounded-lg text-white font-bold">
            </div>
            <button onclick="updateGlobalAPY()" class="bg-emerald-600 px-8 py-3 rounded-lg font-bold self-end hover:bg-emerald-500 transition">Actualizar Tasa</button>
        </div>
    </div>

    <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800">
        <h3 class="text-white font-bold mb-4 uppercase text-xs tracking-widest">Cierre de Mercado Diario</h3>
        <div class="flex gap-4">
            <input id="dailyPercent" type="number" step="0.01" placeholder="% Ganancia hoy" class="flex-1 bg-black border border-zinc-700 p-3 rounded-lg text-white">
            <button onclick="processDailyClosure()" class="bg-white text-black px-8 py-3 rounded-lg font-black uppercase text-xs">Ejecutar Cierre</button>
        </div>
    </div>

    <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 overflow-x-auto">
        <table class="w-full text-left">
            <thead>
                <tr class="text-zinc-500 text-[10px] uppercase border-b border-zinc-800"><th class="pb-4">Usuario</th><th class="pb-4">Saldos</th><th class="pb-4 text-right">Acción</th></tr>
            </thead>
            <tbody id="usersBody"></tbody>
        </table>
    </div>
  </div>
</div>

<script>
// --- Configuración e Iniciación ---
const firebaseConfig = {
  apiKey: "AIzaSyDYQUengy7vyNWX_JgaE-wibB5mBnboXxc",
  authDomain: "intellirobotfunds.firebaseapp.com",
  projectId: "intellirobotfunds",
  storageBucket: "intellirobotfunds.firebasestorage.app",
  messagingSenderId: "203794486415",
  appId: "1:203794486415:web:115c6891eeddbce215ccfa"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const ADMIN_EMAIL = "mora87466@gmail.com";

let globalAPY = 18.5; // Valor por defecto

// --- Lógica de Negocio Rendimiento ---
function listenToSettings() {
    db.collection('settings').doc('yield').onSnapshot(doc => {
        if(doc.exists) {
            globalAPY = doc.data().apy || 18.5;
            const display = document.getElementById('currentAPYDisplay');
            if(display) display.textContent = globalAPY;
            const input = document.getElementById('apyInput');
            if(input) input.value = globalAPY;
        }
    });
}

async function updateGlobalAPY() {
    const newVal = parseFloat(document.getElementById('apyInput').value);
    if(isNaN(newVal)) return alert("Ingresa un número válido");
    await db.collection('settings').doc('yield').set({ apy: newVal });
    alert("Tasa de rendimiento actualizada para todos los usuarios.");
}

// --- Dashboard de Usuario ---
function updateProfitUI(data) {
    const dailyFactor = (globalAPY / 100) / 365;
    
    document.getElementById('capBTC').textContent = (data.capBTC || 0).toFixed(6);
    document.getElementById('profitBTC').textContent = "+" + ((data.capBTC || 0) * dailyFactor).toFixed(6);
    
    document.getElementById('capETH').textContent = (data.capETH || 0).toFixed(6);
    document.getElementById('profitETH').textContent = "+" + ((data.capETH || 0) * dailyFactor).toFixed(6);
    
    document.getElementById('capUSDT').textContent = (data.capUSDT || 0).toFixed(2);
    document.getElementById('profitUSDT').textContent = "+" + ((data.capUSDT || 0) * dailyFactor).toFixed(2);
}

// --- Admin Panel (Carga de Usuarios) ---
function loadUsers() {
    const tbody = document.getElementById('usersBody');
    db.collection('users').onSnapshot(snap => {
        tbody.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            if(data.email === ADMIN_EMAIL) return;
            
            const tr = document.createElement('tr');
            tr.className = "border-b border-zinc-800/50 hover:bg-white/[0.02]";
            tr.innerHTML = `
                <td class="py-4 font-bold text-sm">${data.email}</td>
                <td class="py-4">
                    <div class="grid grid-cols-3 gap-2">
                        <input id="b-${doc.id}" type="number" step="any" value="${data.capBTC||0}" class="bg-black border border-zinc-800 p-1 text-[10px] w-20 text-orange-500">
                        <input id="e-${doc.id}" type="number" step="any" value="${data.capETH||0}" class="bg-black border border-zinc-800 p-1 text-[10px] w-20 text-blue-400">
                        <input id="u-${doc.id}" type="number" step="any" value="${data.capUSDT||0}" class="bg-black border border-zinc-800 p-1 text-[10px] w-20 text-emerald-500">
                    </div>
                </td>
                <td class="py-4 text-right">
                    <button onclick="saveCaps('${doc.id}')" class="text-emerald-500 text-xs font-bold">GUARDAR</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    });
}

async function saveCaps(uid) {
    const b = parseFloat(document.getElementById(`b-${uid}`).value) || 0;
    const e = parseFloat(document.getElementById(`e-${uid}`).value) || 0;
    const u = parseFloat(document.getElementById(`u-${uid}`).value) || 0;
    await db.collection('users').doc(uid).update({ capBTC: b, capETH: e, capUSDT: u });
    alert("Saldos guardados.");
}

// --- Estado de Autenticación ---
auth.onAuthStateChanged(user => {
    if(user && user.emailVerified) {
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('userEmailDisplay').textContent = user.email;
        listenToSettings();

        if(user.email === ADMIN_EMAIL) {
            document.getElementById('adminPanel').classList.remove('hidden');
            loadUsers();
        } else {
            document.getElementById('userStats').classList.remove('hidden');
            db.collection('users').doc(user.uid).onSnapshot(doc => {
                if(doc.exists) updateProfitUI(doc.data());
            });
        }
    } else {
        // Redirigir o mostrar login (aquí simplificado)
        document.getElementById('authButtons').classList.remove('hidden');
    }
});

function logout() { auth.signOut().then(() => location.reload()); }
// (Incluir aquí funciones de modales y procesos de cierre diario del código anterior)
</script>
</body>
</html>
